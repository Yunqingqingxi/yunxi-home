name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run tests
        run: go test -v -race ./...

      - name: Build binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o yunxi-home-linux-amd64 ./cmd/yunxi-home/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: yunxi-home-linux-amd64
